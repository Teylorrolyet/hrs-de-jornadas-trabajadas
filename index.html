<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PORTAL BOSQUE HORARIOS DE JORNADAS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22c55e">
<style>
:root{
 --bg:#020617;
 --card:#0f172a;
 --accent:#22c55e;
 --text:#e2e8f0;
 --danger:#ef4444
}

body{
 margin:0;
 font-family:'Poppins',system-ui;
 color:var(--text);
 overflow-x:hidden;
 background:#020617;
}

/* FONDO ANIMADO */
body::before{
 content:"";
 position:fixed;
 width:200%;
 height:200%;
 background:radial-gradient(circle, rgba(34,197,94,0.2), transparent 40%),
            radial-gradient(circle, rgba(59,130,246,0.2), transparent 40%);
 animation:moveBg 20s linear infinite;
 z-index:-1;
}

@keyframes moveBg{
 0%{transform:translate(0,0)}
 50%{transform:translate(-25%,-25%)}
 100%{transform:translate(0,0)}
}

.container{max-width:520px;margin:auto;padding:16px;padding-bottom:100px}
.header{text-align:center;font-size:22px;font-weight:800;margin-bottom:4px}
.sub{text-align:center;font-size:14px;color:#94a3b8;margin-bottom:12px}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.day{padding:12px;border-radius:12px;background:rgba(15,23,42,0.85);backdrop-filter:blur(6px);text-align:center;cursor:pointer;font-weight:600}
.day.active{outline:2px solid white}
.day.weekend{background:#ef4444;color:#fff}
.card{background:rgba(15,23,42,0.85);backdrop-filter:blur(8px);padding:16px;border-radius:16px;margin-top:12px}
input,button{width:100%;padding:10px;margin-top:8px;border-radius:12px;border:none;font-family:'Poppins'}
input{background:#020617;color:white}
button{background:var(--accent);font-weight:700}
button.del{background:var(--danger)}
.big{text-align:center;font-size:24px;font-weight:800;color:var(--accent)}
.money{text-align:center;font-size:20px;font-weight:700;color:#38bdf8;margin-top:6px}
.navMonth{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.navMonth button{width:auto;padding:6px 12px}
.monthName{font-weight:700;font-size:16px}
.themeBar{display:flex;gap:10px;margin-top:10px;justify-content:center}
.themeBtn{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid white}
</style>
</head>
<body>
<div class="container">

<div class="header">PORTAL BOSQUE</div>
<div class="sub">HORARIOS DE JORNADAS</div>

<div class="card">
<input id="emp" placeholder="Nombre del empleado">
<div class="themeBar">
<div class="themeBtn" style="background:#22c55e" onclick="setTheme('green')"></div>
<div class="themeBtn" style="background:#3b82f6" onclick="setTheme('blue')"></div>
<div class="themeBtn" style="background:#a855f7" onclick="setTheme('purple')"></div>
<div class="themeBtn" style="background:#f97316" onclick="setTheme('orange')"></div>
</div>
</div>

<div class="navMonth">
<button onclick="prevMonth()">◀</button>
<div id="monthLabel" class="monthName"></div>
<button onclick="nextMonth()">▶</button>
</div>

<div id="calendar" class="calendar"></div>

<div class="card">
<div class="big">Horas: <span id="total">0</span> h | Días: <span id="days">0</span></div>
<div class="money">💰 $ <span id="money">0</span></div>
</div>

<div class="card">
<input id="date" type="date">
<input id="start" value="07:00">
<input id="end" value="14:00">
<button onclick="save()">Guardar</button>
</div>

<div class="card">
<b>Día seleccionado</b>
<div id="dayData"></div>
</div>

<div class="card">
<button onclick="share()">Compartir WhatsApp</button>
</div>

</div>

<script>
const RATE = 400;

// FRASES MOTIVACIONALES
const frases=[
"Buen trabajo 👏","Seguís sumando 💪","Día productivo 🚀","Vas excelente 🔥","Constancia es clave","Otro paso más","No pares ahora","Gran esfuerzo","Trabajo sólido","Seguís creciendo",
"Disciplina total","Día cumplido","Sumando horas","Vamos bien","Excelente ritmo","Seguí así","Progreso constante","Gran dedicación","Rendimiento top","Nivel pro",
"Hoy rendiste muy bien","Cada día cuenta","Estás enfocado","Trabajo impecable","Orgullo total","Seguís firme","Mentalidad ganadora","Objetivo en marcha","Día aprovechado","Constancia diaria",
"Seguís mejorando","Trabajo constante","Buen avance","Nada te detiene","Gran jornada","Seguís sumando valor","Compromiso total","Energía positiva","Día bien hecho","Paso a paso"
];

let current=new Date();
let selectedDate=new Date().toISOString().slice(0,10);

const dateInput=document.getElementById('date');
const empInput=document.getElementById('emp');

dateInput.value=selectedDate;
empInput.value=localStorage.getItem('emp')||'';

const months=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

function setTheme(t){
 let root=document.documentElement;
 if(t==='green') root.style.setProperty('--accent','#22c55e');
 if(t==='blue') root.style.setProperty('--accent','#3b82f6');
 if(t==='purple') root.style.setProperty('--accent','#a855f7');
 if(t==='orange') root.style.setProperty('--accent','#f97316');
 localStorage.setItem('theme',t);
}

(function loadTheme(){
 let t=localStorage.getItem('theme')||'green';
 setTheme(t);
})();

function get(){try{return JSON.parse(localStorage.getItem('cal'))||{}}catch{return {}}}
function set(d){localStorage.setItem('cal',JSON.stringify(d))}
function min(t){let[h,m]=t.split(':');return(+h*60)+(+m)}
function calc(a,b){let t=b-a;if(t<0)t+=1440;return(t/60)}
function monthKey(){return current.toISOString().slice(0,7)}

function buildCalendar(){
 let cal=document.getElementById('calendar');
 cal.innerHTML='';
 let y=current.getFullYear();
 let mo=current.getMonth();
 let days=new Date(y,mo+1,0).getDate();

 document.getElementById('monthLabel').innerText=`${months[mo]} ${y}`;

 let data=get();

 for(let i=1;i<=days;i++){
  let d=`${y}-${String(mo+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
  let el=document.createElement('div');

  let dateObj=new Date(d+'T00:00:00');
  let dayWeek=dateObj.getUTCDay();

  el.className='day';
  if(dayWeek===0 || dayWeek===6) el.classList.add('weekend');

  let dayData=(data[monthKey()]||[]).find(x=>x.date===d);
  if(dayData){
    el.style.background=getComputedStyle(document.documentElement).getPropertyValue('--accent');
    el.style.color='#000';
  }

  if(d===selectedDate) el.classList.add('active');

  el.innerText=i;
  el.onclick=()=>{selectedDate=d;dateInput.value=d;render();buildCalendar();};
  cal.appendChild(el);
 }
}

function save(){
 let d=get();
 let mo=monthKey();
 if(!d[mo])d[mo]=[];
 let h=calc(min(start.value),min(end.value));

 let existing=d[mo].find(x=>x.date===dateInput.value);
 if(existing){existing.start=start.value;existing.end=end.value;existing.h=h}
 else d[mo].push({date:dateInput.value,start:start.value,end:end.value,h});

 localStorage.setItem('emp',empInput.value);
 set(d);

 // FRASE ALEATORIA (toast visible)
 let frase=frases[Math.floor(Math.random()*frases.length)];
 mostrarFrase(frase);

 render();buildCalendar();
}

function del(){
 let d=get();
 let mo=monthKey();
 d[mo]=d[mo].filter(x=>x.date!==selectedDate);
 if(d[mo].length===0)delete d[mo];
 set(d);render();buildCalendar();
}

function render(){
 let d=get();
 let mo=monthKey();
 let arr=d[mo]||[];
 let total=0;
 let daysCount=arr.length;
 arr.forEach(x=>total+=+x.h);

 document.getElementById('total').innerText=total.toFixed(2);
 document.getElementById('days').innerText=daysCount;
 document.getElementById('money').innerText=(total*RATE).toFixed(0);

 let day=arr.find(x=>x.date===selectedDate);
 if(day){
 let pay=(day.h*RATE).toFixed(0);
 document.getElementById('dayData').innerHTML=`${day.date}<br>${day.start}-${day.end}<br>${day.h.toFixed(2)}h<br>💰 $${pay}
 <button class='del' onclick='del()'>Eliminar</button>`;
 }else document.getElementById('dayData').innerHTML='Sin registro';
}

function prevMonth(){current.setMonth(current.getMonth()-1);buildCalendar();render()}
function nextMonth(){current.setMonth(current.getMonth()+1);buildCalendar();render()}

function mostrarFrase(txt){
 let el=document.createElement('div');
 el.innerText=txt;
 el.style.position='fixed';
 el.style.bottom='20px';
 el.style.left='50%';
 el.style.transform='translateX(-50%)';
 el.style.background=getComputedStyle(document.documentElement).getPropertyValue('--accent');
 el.style.color='#000';
 el.style.padding='12px 20px';
 el.style.borderRadius='12px';
 el.style.fontWeight='700';
 el.style.zIndex='9999';
 document.body.appendChild(el);
 setTimeout(()=>{el.remove();},4000);
}

function share(){
 let d=get();
 let mo=monthKey();
 let arr=d[mo]||[];
 let name=localStorage.getItem('emp')||'Empleado';
 let txt=`${name}\n${months[current.getMonth()]} ${current.getFullYear()}\n`;
 let total=0;
 arr.forEach(x=>{total+=+x.h;txt+=`${x.date} ${x.h.toFixed(2)}h $${(x.h*RATE).toFixed(0)}\n`});
 txt+=`Total ${total.toFixed(2)}h = $${(total*RATE).toFixed(0)}`;
 window.open('https://wa.me/?text='+encodeURIComponent(txt));
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}

buildCalendar();render();
</script>
</body>
</html>
